<script>
        // Simple Interaction logic
        const chatWindow = document.getElementById('chat-window');
        const input = document.querySelector('input[type="text"]');
        const sendBtn = document.querySelector('button .material-symbols-outlined[data-icon="send"]').parentElement;

        function scrollChat() {
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        // Initial scroll
        window.onload = scrollChat;

        sendBtn.addEventListener('click', () => {
            if (input.value.trim() !== "") {
                const message = input.value;
                const userBubble = `
                    <div class="flex flex-col items-end self-end max-w-[85%] md:max-w-[70%] ml-auto animate-fade-in-up">
                        <div class="vaidya-gradient p-4 rounded-2xl rounded-tr-none shadow-lg border border-white/10">
                            <p class="font-body-lg text-white">${message}</p>
                            <div class="flex justify-end mt-2 items-center gap-1">
                                <span class="text-[10px] text-white/70 font-medium">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                <span class="material-symbols-outlined text-[14px] text-white/70" data-icon="done_all">done_all</span>
                            </div>
                        </div>
                    </div>
                `;
                chatWindow.insertAdjacentHTML('beforeend', userBubble);
                input.value = "";
                scrollChat();
            }
        });

        // Handle Enter key
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
    </script>
