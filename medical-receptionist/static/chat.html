<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Medical Receptionist Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f0f0f; /* Dark background */
            color: #e0e0e0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background-color: #00d4aa; /* Teal accent */
            color: white;
            border-bottom-right-radius: 2px;
        }
        .ai-message {
            align-self: flex-start;
            background-color: #333333; /* Dark gray */
            color: white;
            border-bottom-left-radius: 2px;
        }
        #input-container {
            display: flex;
            padding: 10px 20px;
            border-top: 1px solid #333;
            background-color: #1a1a1a;
        }
        #user-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #00d4aa;
            border-radius: 20px;
            background-color: #2a2a2a;
            color: white;
            outline: none;
            margin-right: 10px;
        }
        #send-button {
            background-color: #00d4aa;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
        }
        #send-button:hover {
            background-color: #00b38c;
        }
        .typing-indicator {
            align-self: flex-start;
            background-color: #333333;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            border-bottom-left-radius: 2px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .message-bubble {
                max-width: 90%;
            }
            #input-container {
                flex-direction: column;
            }
            #user-input {
                margin-right: 0;
                margin-bottom: 10px;
            }
            #send-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <div id="input-container">
        <input type="text" id="user-input" placeholder="Type your message...">
        <button id="send-button">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById("chat-container");
        const userInput = document.getElementById("user-input");
        const sendButton = document.getElementById("send-button");
        let userId = localStorage.getItem("user_id");
        let jwtToken = null;

        if (!userId) {
            userId = generateUUID();
            localStorage.setItem("user_id", userId);
        }

        function generateUUID() {
            return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == "x" ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function appendMessage(message, sender) {
            const messageBubble = document.createElement("div");
            messageBubble.classList.add("message-bubble");
            messageBubble.classList.add(sender === "user" ? "user-message" : "ai-message");
            messageBubble.textContent = message;
            chatContainer.appendChild(messageBubble);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const typingIndicator = document.createElement("div");
            typingIndicator.classList.add("message-bubble", "ai-message", "typing-indicator");
            typingIndicator.textContent = "AI Receptionist is typing...";
            typingIndicator.id = "typing-indicator";
            chatContainer.appendChild(typingIndicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById("typing-indicator");
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        async function authenticate() {
            try {
                const response = await fetch("/auth/token", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: `username=admin&password=password`
                });
                if (!response.ok) {
                    throw new Error("Authentication failed");
                }
                const data = await response.json();
                jwtToken = data.access_token;
                console.log("Authentication successful. JWT Token stored.");
            } catch (error) {
                console.error("Authentication error:", error);
                appendMessage("Error: Could not authenticate with the server. Please try again later.", "ai");
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (message === "") return;

            appendMessage(message, "user");
            userInput.value = "";
            showTypingIndicator();

            if (!jwtToken) {
                await authenticate();
            }

            try {
                const response = await fetch("/webhook", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${jwtToken}`
                    },
                    body: JSON.stringify({ user_id: userId, message: message })
                });
                removeTypingIndicator();
                if (!response.ok) {
                    if (response.status === 401) {
                        // Token might have expired, try re-authenticating and sending again
                        console.warn("JWT token expired or invalid. Re-authenticating...");
                        await authenticate();
                        if (jwtToken) {
                            // Retry sending message after re-authentication
                            const retryResponse = await fetch("/webhook", {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                    "Authorization": `Bearer ${jwtToken}`
                                },
                                body: JSON.stringify({ user_id: userId, message: message })
                            });
                            if (retryResponse.ok) {
                                const data = await retryResponse.json();
                                appendMessage(data.response, "ai");
                            } else {
                                throw new Error(`Failed to send message after re-authentication: ${retryResponse.statusText}`);
                            }
                        } else {
                            throw new Error("Re-authentication failed.");
                        }
                    } else {
                        throw new Error(`Server error: ${response.statusText}`);
                    }
                } else {
                    const data = await response.json();
                    appendMessage(data.response, "ai");
                }
            } catch (error) {
                removeTypingIndicator();
                console.error("Error sending message:", error);
                appendMessage("Error: Something went wrong. Please try again.", "ai");
            }
        }

        sendButton.addEventListener("click", sendMessage);
        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        // Initial authentication when the page loads
        authenticate();
        appendMessage("Hello! Welcome to MediCare Dental & Medical Clinic. How can I assist you today?", "ai");
    </script>
</body>
</html>
