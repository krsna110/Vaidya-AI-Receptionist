<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Vaidya AI - Clinical Chat</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .vaidya-gradient {
            background: linear-gradient(135deg, #571bc1 0%, #06b6d4 100%);
        }
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-4px); opacity: 1; }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 999px; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                      background: "#051424",
                      surface: "#122131",
                      "on-surface": "#d4e4fa",
                      primary: "#4cd7f6",
                      secondary: "#d0bcff",
                      "surface-variant": "#273647",
                      "primary-container": "#06b6d4",
                      "on-primary-container": "#003640",
                      outline: "#869397"
              },
              borderRadius: {
                      xl: "0.75rem",
                      "2xl": "1rem"
              }
            },
          },
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body-lg min-h-screen flex flex-col md:flex-row overflow-hidden">
    <header class="fixed top-0 w-full bg-surface/70 backdrop-blur-md text-primary font-title-md text-title-md h-16 flex justify-between items-center px-4 md:px-8 z-50 border-b border-white/10 shadow-md">
        <div class="flex items-center gap-3">
            <span class="font-display-lg text-2xl text-primary tracking-tight">Vaidya AI</span>
            <div class="h-6 w-px bg-white/10 mx-2 hidden md:block"></div>
            <div class="flex flex-col leading-tight">
                <span class="font-title-md text-body-lg text-on-surface">City Dental Clinic</span>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span>
                    <span class="text-[10px] font-label-caps text-emerald-500 uppercase tracking-widest">Online</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden md:flex glass-panel rounded-full p-1 items-center gap-1">
                <button class="px-3 py-1 rounded-full text-[12px] font-bold bg-primary-container text-on-primary-container">EN</button>
                <button class="px-3 py-1 rounded-full text-[12px] font-medium text-on-surface-variant hover:text-primary transition-colors">हिं</button>
                <button class="px-3 py-1 rounded-full text-[12px] font-medium text-on-surface-variant hover:text-primary transition-colors">Hinglish</button>
            </div>
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined cursor-pointer text-on-surface-variant hover:text-primary transition-colors">language</span>
                <div class="w-10 h-10 rounded-full border border-white/10 overflow-hidden cursor-pointer active:scale-95 transition-all">
                    <img alt="Clinic Admin" class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1544367567-0f2fcb009e1b?auto=format&fit=crop&w=400&q=80">
                </div>
            </div>
        </div>
    </header>
    <aside class="hidden md:flex fixed left-0 top-0 h-full w-[280px] bg-surface-container-low/70 backdrop-blur-xl flex-col p-6 gap-4 border-r border-white/10 shadow-xl z-40 pt-20">
        <div class="flex flex-col gap-1 mb-8">
            <button class="flex items-center gap-4 p-4 bg-secondary-container text-on-secondary-container rounded-xl font-bold transition-all duration-200">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </button>
            <button class="flex items-center gap-4 p-4 text-on-surface-variant hover:bg-surface-variant/50 rounded-xl hover:translate-x-1 transition-all duration-200">
                <span class="material-symbols-outlined">calendar_today</span>
                <span>Appointments</span>
            </button>
            <button class="flex items-center gap-4 p-4 text-on-surface-variant hover:bg-surface-variant/50 rounded-xl hover:translate-x-1 transition-all duration-200">
                <span class="material-symbols-outlined">person</span>
                <span>Patients</span>
            </button>
            <button class="flex items-center gap-4 p-4 text-on-surface-variant hover:bg-surface-variant/50 rounded-xl hover:translate-x-1 transition-all duration-200">
                <span class="material-symbols-outlined">analytics</span>
                <span>Analytics</span>
            </button>
        </div>
        <div class="mt-auto flex flex-col gap-2">
            <button class="flex items-center gap-4 p-4 text-on-surface-variant hover:bg-surface-variant/50 rounded-xl transition-all">
                <span class="material-symbols-outlined">help</span>
                <span>Help</span>
            </button>
            <button class="flex items-center gap-4 p-4 text-error/80 hover:bg-error-container/20 rounded-xl transition-all">
                <span class="material-symbols-outlined">logout</span>
                <span>Logout</span>
            </button>
        </div>
    </aside>
    <main class="flex-1 flex flex-col pt-16 md:pl-[280px] h-screen bg-background relative">
        <div class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-44">
            <div class="flex flex-col gap-3 mb-6">
                <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
                    <div>
                        <h1 class="text-3xl font-bold text-on-surface">Clinical Chat</h1>
                        <p class="text-on-surface-variant">Chat with Vaidya AI and book appointments instantly.</p>
                    </div>
                    <button class="inline-flex items-center gap-2 px-5 py-3 bg-primary-container text-on-primary-container rounded-2xl font-semibold shadow-lg hover:brightness-110 transition">Open Chat</button>
                </div>
                <div id="chat-window" class="flex-1 overflow-y-auto space-y-6 pb-4"></div>
            </div>
        </div>
        <div class="absolute bottom-0 left-0 md:left-[280px] right-0 p-4 md:p-6 bg-gradient-to-t from-background via-background/95 to-transparent">
            <div class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
                <button type="button" class="quick-reply-btn whitespace-nowrap px-4 py-2 glass-panel rounded-full text-sm font-medium text-primary border-primary/30 hover:bg-primary/10 transition active:scale-95">Book Appointment</button>
                <button type="button" class="quick-reply-btn whitespace-nowrap px-4 py-2 glass-panel rounded-full text-sm font-medium text-on-surface-variant hover:text-primary transition active:scale-95">Cancel Booking</button>
                <button type="button" class="quick-reply-btn whitespace-nowrap px-4 py-2 glass-panel rounded-full text-sm font-medium text-on-surface-variant hover:text-primary transition active:scale-95">Clinic Timings</button>
                <button type="button" class="quick-reply-btn whitespace-nowrap px-4 py-2 glass-panel rounded-full text-sm font-medium text-on-surface-variant hover:text-primary transition active:scale-95">Talk to Doctor</button>
            </div>
            <div class="glass-panel p-3 rounded-2xl flex items-center gap-3 shadow-2xl focus-within:border-primary/50 transition-all">
                <button type="button" class="p-2 text-on-surface-variant hover:text-primary transition active:scale-90">
                    <span class="material-symbols-outlined">add_circle</span>
                </button>
                <input id="user-input" class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface placeholder-on-surface-variant/50 font-body-lg" placeholder="Type a message..." type="text">
                <div class="flex items-center gap-1 pr-1">
                    <button type="button" class="p-2 text-on-surface-variant hover:text-primary transition active:scale-90">
                        <span class="material-symbols-outlined">mic</span>
                    </button>
                    <button id="send-button" type="button" class="w-12 h-12 vaidya-gradient rounded-2xl flex items-center justify-center text-white shadow-lg active:scale-90 transition-all">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </div>
            </div>
            <div class="mt-4 md:hidden h-16"></div>
        </div>
    </main>
    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 md:hidden bg-surface-container-highest/80 backdrop-blur-lg border-t border-white/10 shadow-[0_-4px_20px_rgba(0,0,0,0.3)] rounded-t-xl">
        <div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-white/5 active:scale-90 transition-transform cursor-pointer">
            <span class="material-symbols-outlined">home</span>
            <span class="font-label-caps text-label-caps mt-1">Home</span>
        </div>
        <div class="flex flex-col items-center justify-center bg-primary-container/20 text-primary p-2 rounded-2xl active:scale-90 transition-transform cursor-pointer">
            <span class="material-symbols-outlined">chat_bubble</span>
            <span class="font-label-caps text-label-caps mt-1">Chat</span>
        </div>
        <div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-white/5 active:scale-90 transition-transform cursor-pointer">
            <span class="material-symbols-outlined">history_edu</span>
            <span class="font-label-caps text-label-caps mt-1">Records</span>
        </div>
        <div class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-white/5 active:scale-90 transition-transform cursor-pointer">
            <span class="material-symbols-outlined">person</span>
            <span class="font-label-caps text-label-caps mt-1">Profile</span>
        </div>
    </nav>
    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        let userId = localStorage.getItem('user_id');
        let jwtToken = null;

        if (!userId) {
            userId = generateUUID();
            localStorage.setItem('user_id', userId);
        }

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function appendMessage(message, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = sender === 'user'
                ? 'flex flex-col items-end self-end max-w-[85%] md:max-w-[70%] ml-auto'
                : 'flex flex-col items-start max-w-[85%] md:max-w-[70%]';
            const bubble = document.createElement('div');
            bubble.className = sender === 'user'
                ? 'vaidya-gradient p-4 rounded-2xl rounded-tr-none shadow-[0_4px_15px_rgba(6,182,212,0.3)] border border-white/10'
                : 'glass-panel p-4 rounded-2xl rounded-tl-none shadow-xl';
            const text = document.createElement('p');
            text.className = 'font-body-lg text-on-surface leading-relaxed';
            text.textContent = message;
            bubble.appendChild(text);
            const meta = document.createElement('div');
            meta.className = 'flex justify-end mt-2 items-center gap-1';
            const time = document.createElement('span');
            time.className = sender === 'user' ? 'text-[10px] text-white/70 font-medium' : 'text-[10px] text-on-surface-variant font-medium';
            time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            meta.appendChild(time);
            if (sender === 'user') {
                const icon = document.createElement('span');
                icon.className = 'material-symbols-outlined text-[14px] text-white/70';
                icon.textContent = 'done_all';
                meta.appendChild(icon);
            }
            bubble.appendChild(meta);
            wrapper.appendChild(bubble);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex flex-col items-start';
            wrapper.id = 'typing-wrapper';
            const indicator = document.createElement('div');
            indicator.className = 'glass-panel px-4 py-3 rounded-2xl rounded-tl-none flex items-center gap-1';
            indicator.innerHTML = '<div class="typing-dot w-1.5 h-1.5 bg-primary rounded-full"></div><div class="typing-dot w-1.5 h-1.5 bg-primary rounded-full"></div><div class="typing-dot w-1.5 h-1.5 bg-primary rounded-full"></div>';
            wrapper.appendChild(indicator);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        function removeTypingIndicator() {
            const wrapper = document.getElementById('typing-wrapper');
            if (wrapper) wrapper.remove();
        }

        async function authenticate() {
            try {
                const response = await fetch('/auth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'username=admin&password=password'
                });
                if (!response.ok) throw new Error('Auth failed');
                const data = await response.json();
                jwtToken = data.access_token;
            } catch (err) {
                console.error(err);
                appendMessage('Unable to authenticate with the backend. Please try again later.', 'ai');
            }
        }

        async function callWebhook(message) {
            if (!jwtToken) await authenticate();
            const response = await fetch('/webhook', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${jwtToken}`
                },
                body: JSON.stringify({ user_id: userId, message })
            });
            if (response.status === 401) {
                jwtToken = null;
                return callWebhook(message);
            }
            if (!response.ok) {
                throw new Error(`Webhook failed: ${response.statusText}`);
            }
            return response.json();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            appendMessage(message, 'user');
            userInput.value = '';
            showTypingIndicator();
            try {
                const data = await callWebhook(message);
                removeTypingIndicator();
                appendMessage(data.response || 'Sorry, I did not get a response.', 'ai');
            } catch (err) {
                removeTypingIndicator();
                appendMessage('Something went wrong. Please try again.', 'ai');
                console.error(err);
            }
        }

        document.querySelectorAll('.quick-reply-btn').forEach((btn) => {
            btn.addEventListener('click', () => sendMessage(btn.textContent.trim()));
        });
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        });

        (async () => {
            await authenticate();
            appendMessage('Hello! Welcome to Vaidya AI reception. How can I assist you today?', 'ai');
        })();
    </script>
</body>
</html>
